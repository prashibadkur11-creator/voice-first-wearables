# JSON Schema (Draft 2020-12) for a wearable auth config.
# A developer's auth.yaml is validated against this contract.
#
# Model recap:
#   Factors (3):  voiceprint (are) | proximity (have) | pin_voice (deliberate intent)
#   Levels  (4 canonical): L0_none < L1_passive < L2_verified < L3_explicit
#   L0_none is required; L1-L3 are optional (define only what the device uses).
#   Trust decays; L3 is never cached.
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://github.com/prashibadkur11-creator/voice-first-wearables/schema/auth.schema.yaml"
title: WearableAuthConfig
type: object
additionalProperties: false
required: [factors, levels]

properties:

  factors:
    description: Which auth factors this device can collect. Each is a pluggable verifier.
    type: array
    minItems: 1
    uniqueItems: true
    items:
      enum: [voiceprint, proximity, pin_voice]

  levels:
    description: >
      The assurance levels this device defines. L0_none is required (every device
      has an unauthenticated state). L1-L3 are optional: a device with no
      high-stakes actions may define only the levels it uses. Level names are
      canonical - no custom levels. The validator enforces (cross-file) that every
      min_level referenced in commands.yaml is defined here.
    type: object
    additionalProperties: false
    required: [L0_none]
    properties:
      L0_none:        { $ref: "#/$defs/level" }
      L1_passive:     { $ref: "#/$defs/level" }
      L2_verified:    { $ref: "#/$defs/level" }
      L3_explicit:    { $ref: "#/$defs/level" }

  fallbacks:
    description: What the device does when a factor fails or is lost.
    type: object
    additionalProperties: false
    properties:
      voiceprint_fail:
        enum: [challenge_pin, drop_to_l0, retry_once]
      proximity_lost:
        enum: [drop_to_l0, drop_one_level, hold]
      device_unworn:
        enum: [reset_to_l0, hold]

$defs:

  level:
    type: object
    additionalProperties: false
    properties:
      requires:
        description: ALL of these factors must be present for the level (logical AND).
        type: array
        uniqueItems: true
        items:
          enum: [voiceprint, proximity, pin_voice]
      requires_any:
        description: AT LEAST ONE of these factors must be present (logical OR).
        type: array
        minItems: 2
        uniqueItems: true
        items:
          enum: [voiceprint, proximity, pin_voice]
      decay_seconds:
        description: How long this level holds before dropping one level. Omit for no decay.
        type: integer
        minimum: 0
      never_cache:
        description: If true, this level is re-challenged every time (used for L3).
        type: boolean
    # A level uses requires, requires_any, both, or neither (L0_none = neither).
