# Smart glasses: the full-featured example.
# All 3 factors, all 4 assurance levels, decay, never-cache, and fallbacks.
# Story: glasses that handle messages, navigation, and payments.

factors: [voiceprint, proximity, pin_voice]

levels:
  # Anyone wearing them: time, weather.
  L0_none: {}

  # Sounds like the owner OR the paired phone is nearby: casual reads.
  L1_passive:
    requires_any: [voiceprint, proximity]

  # Sounds like the owner AND phone nearby: personal actions.
  # Trust expires after 5 minutes, dropping back to L1.
  L2_verified:
    requires: [voiceprint, proximity]
    decay_seconds: 300

  # Everything above PLUS a spoken PIN: money and irreversible actions.
  # never_cache: granted for exactly one action, then re-challenged.
  L3_explicit:
    requires: [voiceprint, proximity, pin_voice]
    never_cache: true

fallbacks:
  voiceprint_fail: challenge_pin   # can't recognize the voice -> ask for PIN
  proximity_lost: drop_one_level   # phone walked away -> one rung down
  device_unworn: reset_to_l0       # glasses off -> trust wiped (wearer may change)
